services:
  - type: web
    name: blood-match-api
    runtime: node
    region: singapore
    plan: free

    buildCommand: npm ci --omit=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

      # Database Configuration - Auto-linked from PostgreSQL
      - key: DATABASE_URL
        fromDatabase:
          name: blood-match-db
          property: connectionString

      # JWT Configuration
      - key: JWT_SECRET
        sync: false
      - key: JWT_ISSUER
        value: BLOOD_MATCH_API
      - key: JWT_AUDIENCE
        value: BLOOD_MATCH_API_CLIENT
      - key: JWT_EXPIRES_IN
        value: 1h

databases:
  - name: blood-match-db
    databaseName: blood_match
    region: singapore
    plan: free