services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blood-match-api
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: blood-match-db
    environment:
      POSTGRES_DB: blood_match
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blood_match"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
